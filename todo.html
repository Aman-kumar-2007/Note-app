<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do</title>
    <link rel="stylesheet" href="/css files/todo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

<body>

            <img src="/images/profilePic.jpg" alt="profilePic">
            <div class="header-side-discription">
                <p>Good Morning 🌞!</p>
                <h2>Aman Kumar</h2>
            </div>
        </div>
        <a href=""><i class="fa-solid fa-bell"></i></a>
    </div>

    <div class="todo-body">

        <hr>
        <div class="todo-list">

        </div>
    </div>

    <script src="/Js files/todo.js"></script>
